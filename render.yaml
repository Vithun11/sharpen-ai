# Render Blueprint — auto-configures the service on Render
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sharpen-ai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: openai-compatible
      - key: GROQ_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      - key: AI_BASE_URL
        sync: false
      - key: MOCK_AI
        value: "false"
